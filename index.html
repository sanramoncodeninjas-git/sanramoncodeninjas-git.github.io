<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clickable World Map</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Interactive World Map</h1>

<svg id="worldMap" viewBox="0 0 1000 500">

  <!-- North America -->
  <path id="usa" class="country group1"
    d="M100,200 L200,180 L250,220 L200,260 L120,240 Z" />

  <path id="mexico" class="country group4"
    d="M100,300 L200,280 L250,320 L200,360 L120,340 Z" />


  <path id="canada" class="country group2"
    d="M100,120 L200,100 L250,140 L180,180 L120,160 Z" />

  <!-- South America -->
  <path id="brazil" class="country group3"
    d="M300,260 L340,280 L320,340 L280,320 Z" />

  <!-- Europe -->
  <path id="france" class="country group4"
    d="M500,180 L530,170 L540,200 L510,210 Z" />

  <!-- Africa -->
  <path id="nigeria" class="country group1"
    d="M520,260 L560,250 L570,300 L530,310 Z" />

  <!-- Asia -->
  <path id="china" class="country group2"
    d="M650,180 L720,170 L750,220 L680,230 Z" />

  <!-- Oceania -->
  <path id="australia" class="country group3"
    d="M800,350 L860,340 L880,380 L820,390 Z" />

</svg>

<script src="script.js"></script>
</body>
</html>
